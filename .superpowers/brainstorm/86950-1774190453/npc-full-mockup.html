<h2>NPC Dialog — Full Screen Mockup</h2>
<p class="subtitle">This is how the "Tell me about yourself" screen will look. Click the state you want to preview.</p>

<div style="display:flex; gap:16px; flex-wrap:wrap; justify-content:center; margin-top:16px;">

  <!-- State toggle buttons -->
  <button onclick="showState('question')" style="padding:8px 18px; border-radius:20px; border:1.5px solid #BFFF00; background:#BFFF00; font-weight:700; cursor:pointer; font-size:13px;">Asking question</button>
  <button onclick="showState('loading')" style="padding:8px 18px; border-radius:20px; border:1.5px solid #ccc; background:white; font-weight:700; cursor:pointer; font-size:13px;">NPC thinking...</button>
  <button onclick="showState('typing')" style="padding:8px 18px; border-radius:20px; border:1.5px solid #ccc; background:white; font-weight:700; cursor:pointer; font-size:13px;">User typing</button>
</div>

<!-- Phone frame -->
<div style="display:flex; justify-content:center; margin-top:20px;">
  <div style="width:300px; height:580px; background:#FDFFF5; border-radius:36px; border:2px solid #ddd; overflow:hidden; box-shadow:0 8px 32px rgba(0,0,0,0.12); display:flex; flex-direction:column; position:relative;">

    <!-- Progress dots -->
    <div style="display:flex; justify-content:center; gap:6px; padding:20px 0 12px; background:#FDFFF5;">
      <div style="width:7px;height:7px;border-radius:50%;background:#BFFF00;"></div>
      <div style="width:7px;height:7px;border-radius:50%;background:#BFFF00;"></div>
      <div style="width:7px;height:7px;border-radius:50%;background:rgba(0,0,0,0.1);"></div>
      <div style="width:7px;height:7px;border-radius:50%;background:rgba(0,0,0,0.1);"></div>
      <div style="width:7px;height:7px;border-radius:50%;background:rgba(0,0,0,0.1);"></div>
    </div>

    <!-- NPC portrait area -->
    <div style="flex:1; display:flex; justify-content:center; align-items:center; padding:12px;">
      <div id="portrait" style="width:110px; height:140px; background:#e5e7eb; border-radius:20px; border:2px solid #BFFF00; display:flex; align-items:center; justify-content:center; font-size:11px; color:#888; transition:all 0.3s; box-shadow:0 0 0 0 rgba(191,255,0,0);">
        NPC portrait
      </div>
    </div>

    <!-- Dialog box -->
    <div style="margin:0 12px 12px; background:white; border:1.5px solid #e5e7eb; border-radius:20px; padding:16px; display:flex; flex-direction:column; gap:10px; box-shadow:0 2px 12px rgba(0,0,0,0.07);">

      <!-- NPC name -->
      <div style="font-size:9px; font-weight:700; color:#9FE800; letter-spacing:1.2px; text-transform:uppercase; font-family:monospace;">Pip — Career Guide</div>

      <!-- NPC message -->
      <div id="npc-text" style="font-size:12px; color:#111; line-height:1.6; min-height:42px; transition:opacity 0.3s;">
        "What subjects or activities make you lose track of time?"
      </div>

      <!-- Thinking dots (hidden by default) -->
      <div id="thinking" style="display:none; gap:4px; align-items:center;">
        <div class="dot-pulse" style="width:7px;height:7px;border-radius:50%;background:#BFFF00;animation:pulse 1s infinite;"></div>
        <div class="dot-pulse" style="width:7px;height:7px;border-radius:50%;background:#BFFF00;animation:pulse 1s infinite 0.2s;"></div>
        <div class="dot-pulse" style="width:7px;height:7px;border-radius:50%;background:#BFFF00;animation:pulse 1s infinite 0.4s;"></div>
      </div>

      <div style="height:1px; background:#f0f0f0;"></div>

      <!-- Input row -->
      <div style="display:flex; gap:8px; align-items:center;">
        <div id="input-box" style="flex:1; background:#FDFFF5; border:1px solid #e0e0e0; border-radius:10px; padding:8px 10px; font-size:11px; color:#aaa;">Your answer...</div>
        <div id="send-btn" style="background:#BFFF00; border-radius:8px; width:30px; height:30px; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; flex-shrink:0;">→</div>
      </div>
    </div>

  </div>
</div>

<style>
@keyframes pulse {
  0%, 100% { opacity: 0.3; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1); }
}
@keyframes portraitGlow {
  0%, 100% { box-shadow: 0 0 0 0 rgba(191,255,0,0.4); }
  50% { box-shadow: 0 0 0 8px rgba(191,255,0,0); }
}
.glow {
  animation: portraitGlow 1.2s ease-in-out infinite !important;
  border-color: #9FE800 !important;
}
</style>

<script>
function showState(state) {
  const portrait = document.getElementById('portrait');
  const npcText = document.getElementById('npc-text');
  const thinking = document.getElementById('thinking');
  const inputBox = document.getElementById('input-box');
  const sendBtn = document.getElementById('send-btn');

  // Reset
  portrait.classList.remove('glow');
  thinking.style.display = 'none';
  npcText.style.display = 'block';
  inputBox.style.color = '#aaa';
  inputBox.textContent = 'Your answer...';
  sendBtn.style.opacity = '1';

  if (state === 'question') {
    npcText.textContent = '"What subjects or activities make you lose track of time?"';
  }

  if (state === 'loading') {
    npcText.style.display = 'none';
    thinking.style.display = 'flex';
    portrait.classList.add('glow');
    inputBox.style.color = '#ccc';
    inputBox.textContent = 'Waiting for Pip...';
    sendBtn.style.opacity = '0.3';
  }

  if (state === 'typing') {
    npcText.textContent = '"What subjects or activities make you lose track of time?"';
    inputBox.style.color = '#111';
    inputBox.textContent = 'I really enjoy making music and...';
  }

  // Update button styles
  document.querySelectorAll('button').forEach(b => {
    b.style.background = 'white';
    b.style.borderColor = '#ccc';
  });
  event.target.style.background = '#BFFF00';
  event.target.style.borderColor = '#BFFF00';
}
</script>
